- id: bylaws-review
  label: Governance
  title: Bylaw Review Committee
  timing: As review work is scheduled
  commitment: Short-term review project
  summary: Review PTO bylaws and governance materials before recommendations are brought forward.
  note: Membership is under review. Volunteers with legal, governance, or bylaws experience are especially welcome.
