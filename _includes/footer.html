<footer class="site-footer">
  <div class="wrap footer-grid">
    <div class="footer-about">
      <a class="footer-brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/yg-pto-crane-sun-logo.png' | relative_url }}" alt="" width="56" height="56">
        <span>{{ site.title }}</span>
      </a>
      <p>PTO updates, meetings, events, and ways for YG families to help.</p>
    </div>
    <nav class="footer-nav-block" aria-label="Footer navigation">
      <h2 class="footer-heading">Site links</h2>
      <ul class="footer-nav">
        {% for item in site.data.navigation %}
          <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
    <div class="footer-note">
      <h2 class="footer-heading">For families</h2>
      <p>Dates, links, and details are added when they are ready to share.</p>
      <a class="quiet-link" href="{{ '/sitemap/' | relative_url }}">Sitemap</a>
    </div>
  </div>
</footer>
