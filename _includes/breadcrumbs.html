{% unless page.url == "/" %}
  <nav class="breadcrumbs wrap" aria-label="Breadcrumb">
    <ol>
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      {% if page.section and page.section_url and page.url != page.section_url %}
        <li><a href="{{ page.section_url | relative_url }}">{{ page.section }}</a></li>
      {% endif %}
      <li aria-current="page">{{ page.title }}</li>
    </ol>
  </nav>
{% endunless %}
