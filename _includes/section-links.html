{% for item in site.data.navigation %}
  {% if item.url == page.url and item.children %}
    <section class="link-section" aria-labelledby="section-links-title">
      <h2 id="section-links-title">Pages in this section</h2>
      <div class="card-grid card-grid--two">
        {% for child in item.children %}
          <a class="action-card" href="{{ child.url | relative_url }}">
            <span class="badge">{{ item.title }}</span>
            <h3>{{ child.title }}</h3>
            <p>{{ child.description }}</p>
          </a>
        {% endfor %}
      </div>
    </section>
  {% endif %}
{% endfor %}
