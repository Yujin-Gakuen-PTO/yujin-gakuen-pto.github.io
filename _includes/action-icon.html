{% assign icon_name = include.icon | default: "arrow" %}
{% assign icon_image = site.data.icon_overrides[icon_name] %}
{% if icon_image %}
  <img class="site-icon-image" src="{{ icon_image | relative_url }}" alt="" loading="lazy">
{% else %}
<svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
  {% case icon_name %}
    {% when "join" or "community" %}
      <circle cx="9" cy="8" r="3"></circle>
      <circle cx="17" cy="9" r="2.4"></circle>
      <path d="M3.5 19c.7-3 2.6-5 5.5-5s4.8 2 5.5 5"></path>
      <path d="M13.5 18.5c.5-2.2 1.8-3.6 3.8-3.6 1.9 0 3.2 1.4 3.7 3.6"></path>
    {% when "volunteer" %}
      <path d="M7 12.5 12 18l5-5.5a3.1 3.1 0 0 0-4.5-4.2L12 8.8l-.5-.5A3.1 3.1 0 0 0 7 12.5Z"></path>
      <path d="M4 19h16"></path>
    {% when "calendar" or "meeting" %}
      <rect x="4" y="5" width="16" height="15" rx="2"></rect>
      <path d="M8 3v4"></path>
      <path d="M16 3v4"></path>
      <path d="M4 10h16"></path>
    {% when "report" or "decisions" %}
      <path d="M8 4h8l1 2h2v15H5V6h2l1-2Z"></path>
      <path d="M9 11h6"></path>
      <path d="M9 15h6"></path>
    {% when "committee" %}
      <circle cx="12" cy="7.5" r="2.8"></circle>
      <path d="M6 20c.7-3.8 2.7-5.8 6-5.8s5.3 2 6 5.8"></path>
      <path d="M4.5 13.5a3 3 0 0 1 3-3"></path>
      <path d="M19.5 13.5a3 3 0 0 0-3-3"></path>
    {% when "spending" %}
      <circle cx="12" cy="12" r="7"></circle>
      <path d="M12 8v8"></path>
      <path d="M9.5 10.2c.5-.8 1.3-1.2 2.5-1.2 1.4 0 2.4.7 2.4 1.8 0 2.5-4.8 1.3-4.8 3.8 0 1.1 1 1.9 2.5 1.9 1.1 0 2-.4 2.6-1.2"></path>
    {% when "shield" %}
      <path d="M12 3 5 6v5.5c0 4.2 2.8 7.5 7 9.5 4.2-2 7-5.3 7-9.5V6l-7-3Z"></path>
      <path d="m9 12 2 2 4-4"></path>
    {% when "lock" %}
      <rect x="5" y="10" width="14" height="10" rx="2"></rect>
      <path d="M8 10V8a4 4 0 0 1 8 0v2"></path>
    {% when "building" %}
      <path d="M4 20h16"></path>
      <path d="M6 20V8l6-4 6 4v12"></path>
      <path d="M9 20v-5h6v5"></path>
      <path d="M9 10h.01"></path>
      <path d="M15 10h.01"></path>
    {% when "basket" %}
      <path d="M5 10h14l-1.4 9H6.4L5 10Z"></path>
      <path d="M8 10a4 4 0 0 1 8 0"></path>
      <path d="M9 14h6"></path>
    {% when "bag" %}
      <path d="M6 8h12l-1 12H7L6 8Z"></path>
      <path d="M9 8a3 3 0 0 1 6 0"></path>
    {% when "hands-heart" %}
      <path d="M12 8.5 10.8 7.3a2.4 2.4 0 0 0-3.4 3.4L12 15l4.6-4.3a2.4 2.4 0 0 0-3.4-3.4L12 8.5Z"></path>
      <path d="M4 16.5c2.6 2.5 5.3 3.7 8 3.7s5.4-1.2 8-3.7"></path>
    {% when "mail" %}
      <rect x="4" y="6" width="16" height="12" rx="2"></rect>
      <path d="m4 8 8 6 8-6"></path>
    {% when "book" %}
      <path d="M5 5.5A3.5 3.5 0 0 1 8.5 4H20v15H8.5A3.5 3.5 0 0 0 5 20.5v-15Z"></path>
      <path d="M5 5.5A3.5 3.5 0 0 0 1.5 4H4"></path>
    {% when "heart" %}
      <path d="M12 20 5.5 13.7a4.2 4.2 0 0 1 6-5.9L12 8.3l.5-.5a4.2 4.2 0 0 1 6 5.9L12 20Z"></path>
    {% when "school" %}
      <path d="M4 20h16"></path>
      <path d="M6 20V9l6-4 6 4v11"></path>
      <path d="M10 20v-5h4v5"></path>
      <path d="M8 12h8"></path>
    {% when "apple" %}
      <path d="M12 7c3.8-2 7 1 6 5.5C17.2 16.2 15 20 12 20s-5.2-3.8-6-7.5C5 8 8.2 5 12 7Z"></path>
      <path d="M12 7c.2-2 1.2-3.2 3-3.8"></path>
    {% when "playground" %}
      <path d="M4 19h16"></path>
      <path d="M7 19V9l5-4 5 4v10"></path>
      <path d="M9 13h6"></path>
      <path d="M9 16h6"></path>
    {% when "arrow" %}
      <path d="M5 12h14"></path>
      <path d="m13 6 6 6-6 6"></path>
    {% else %}
      <circle cx="12" cy="12" r="8"></circle>
      <path d="M12 8v4l3 2"></path>
  {% endcase %}
</svg>
{% endif %}
