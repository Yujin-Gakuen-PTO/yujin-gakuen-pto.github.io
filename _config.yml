title: Yujin Gakuen PTO
description: Yujin Gakuen PTO updates, events, meetings, volunteer opportunities, and family information.
url: "https://yujin-gakuen-pto.github.io"
baseurl: ""
lang: en
timezone: America/Los_Angeles
markdown: kramdown
permalink: pretty

defaults:
